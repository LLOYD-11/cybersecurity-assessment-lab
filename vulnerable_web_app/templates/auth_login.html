<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ mode|title }} Auth Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="container">
      <a class="back-link" href="{{ url_for('index') }}">Back to home</a>

      <h1>{{ mode|title }} Auth Login</h1>

      {% if mode == "weak" %}
        <p class="warning-text">
          This form compares user input against a plaintext password stored in the database.
        </p>
      {% else %}
        <p>
          This form verifies the password against a stored hash using Werkzeug.
        </p>
      {% endif %}

      <form method="post" class="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="off" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Log in</button>
      </form>

      <section class="note">
        <h2>Demo Account</h2>
        <p><code>carol</code> / <code>letmein123</code></p>
      </section>
    </main>
  </body>
</html>
